{% comment %}
Flash messages rendered with the design-system palette (pt-BR feedback).
Covers success/error/warning/info; each alert is dismissible.
{% endcomment %}

{% if messages %}
  <div class="mb-4 space-y-2">
    {% for message in messages %}
      <div class="alert
        {% if message.tags == 'success' %}alert-success
        {% elif message.tags == 'error' %}alert-error
        {% elif message.tags == 'warning' %}alert-warning
        {% else %}alert-info{% endif %}"
        role="alert">
        <span>{{ message }}</span>
        <button type="button" aria-label="Fechar" class="text-current/70 hover:text-current" onclick="this.parentElement.remove()">
          <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>
    {% endfor %}
  </div>
{% endif %}
