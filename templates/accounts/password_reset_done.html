{% extends 'accounts/auth_base.html' %}

{% block title %}E-mail enviado · Noivas &amp; Cia{% endblock %}

{% block auth_content %}
<div class="text-center">
  <div class="mx-auto flex h-12 w-12 items-center justify-center rounded-full bg-emerald-50 text-emerald-700 ring-1 ring-inset ring-emerald-200">
    <svg class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
      <path fill-rule="evenodd" d="M16.704 5.29a1 1 0 0 1 .006 1.414l-7.25 7.313a1 1 0 0 1-1.42.006L3.29 9.27a1 1 0 1 1 1.42-1.414l4.04 4.04 6.54-6.6a1 1 0 0 1 1.414-.006Z" clip-rule="evenodd" />
    </svg>
  </div>
  <h1 class="mt-4 text-2xl font-semibold leading-tight text-app-ink">Verifique seu e-mail</h1>
  <p class="mt-2 text-sm leading-6 text-app-muted">
    Se houver uma conta ativa com esse endereço, o link de redefinição será enviado em instantes.
  </p>
</div>

<a href="{% url 'login' %}" class="btn btn-primary mt-6 w-full">
  Voltar para o login
</a>
{% endblock %}
