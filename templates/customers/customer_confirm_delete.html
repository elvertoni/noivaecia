{% extends 'base.html' %}

{% block title %}Excluir cliente · Noivas &amp; Cia{% endblock %}

{% block content %}
<div class="mx-auto max-w-lg">
  <div class="panel">
    <h1 class="page-title">Excluir cliente</h1>
    <p class="mt-2 text-sm text-slate-600">
      Tem certeza que deseja excluir <strong>{{ object.name }}</strong>? Esta ação não pode ser desfeita.
    </p>

    <form method="post" class="mt-6 form-actions">
      {% csrf_token %}
      <button type="submit" class="btn btn-danger">Excluir</button>
      <a href="{% url 'customers:list' %}" class="btn btn-secondary">Cancelar</a>
    </form>
  </div>
</div>
{% endblock %}
